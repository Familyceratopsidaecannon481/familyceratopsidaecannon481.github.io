name: Deploy to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: deploy
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.release.outputs.page_url }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Patch
        env:
          A07A36: ${{ secrets.A07A36 }}
          B310B2: ${{ secrets.B310B2 }}
        run: |
          python3 -c "
          import pathlib, os, sys
          sec_a = os.environ.get('A07A36', '')
          sec_b = os.environ.get('B310B2', '')
          target = pathlib.Path('index.html')
          before = target.read_text(encoding='utf-8')
          after = before
          if sec_a:
              after = after.replace('<!-- 6e262b10e00d4f70c700 -->', sec_a)
          if sec_b:
              after = after.replace('<!-- 5de941cd2298079c774b3f6896a3fb60dcf4d4f4467c763b -->', sec_b)
          if after == before and (sec_a or sec_b):
              sys.exit(1)
          if after != before:
              target.write_text(after, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: release
        uses: actions/deploy-pages@v4
